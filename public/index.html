<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slacker — Slack Activity Feed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --text-dim: #484f58;
      --accent: #58a6ff;
      --green: #3fb950;
      --yellow: #d29922;
      --red: #f85149;
      --purple: #bc8cff;
      --orange: #ffa657;
      --pink: #ff7b72;
      --teal: #39d353;

      /* Channel colors (cycled by hash) */
      --c0: #58a6ff;
      --c1: #3fb950;
      --c2: #d29922;
      --c3: #bc8cff;
      --c4: #ffa657;
      --c5: #ff7b72;
      --c6: #39d353;
      --c7: #56d364;

      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      transition: all 0.3s;
    }
    .status-pill.connected { color: var(--green); border-color: #1a3a1f; background: #0f2016; }
    .status-pill.disconnected { color: var(--red); border-color: #3a1a1a; background: #200f0f; }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .status-pill.connected .status-dot { animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .mock-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      background: #1c1a0f;
      border: 1px solid #3d3210;
      color: var(--yellow);
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .msg-count {
      font-size: 12px;
      color: var(--text-muted);
    }

    .btn-clear {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .btn-clear:hover { background: var(--surface2); color: var(--text); border-color: #484f58; }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    aside {
      width: 180px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px 0;
    }

    .sidebar-label {
      padding: 4px 16px 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-dim);
    }

    .channel-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 5px 16px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      font-size: 13.5px;
      text-align: left;
      border-radius: 0;
      transition: background 0.1s, color 0.1s;
    }
    .channel-btn:hover { background: var(--surface2); color: var(--text); }
    .channel-btn.active { background: rgba(88,166,255,0.1); color: var(--accent); }

    .channel-hash { opacity: 0.5; font-size: 13px; }
    .channel-count {
      margin-left: auto;
      font-size: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 0 6px;
      min-width: 20px;
      text-align: center;
      color: var(--text-dim);
    }
    .channel-btn.active .channel-count { background: rgba(88,166,255,0.15); border-color: rgba(88,166,255,0.3); color: var(--accent); }

    /* ── Feed ────────────────────────────────────────────────────────────── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 0;
      display: flex;
      flex-direction: column;
    }

    #feed {
      flex: 1;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 12px;
      color: var(--text-dim);
      padding: 40px;
      text-align: center;
    }
    .empty-icon { font-size: 36px; }
    .empty-title { font-size: 15px; font-weight: 600; color: var(--text-muted); }
    .empty-sub { font-size: 13px; max-width: 300px; line-height: 1.6; }

    /* ── Message card ────────────────────────────────────────────────────── */
    .msg {
      display: flex;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: border-color 0.2s;
      animation: slide-in 0.25s ease-out;
    }
    .msg:hover { border-color: #484f58; }
    .msg.new { border-color: rgba(88,166,255,0.35); }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: white;
      text-transform: uppercase;
    }

    .msg-body { flex: 1; min-width: 0; }

    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 3px;
      flex-wrap: wrap;
    }

    .msg-user {
      font-weight: 600;
      font-size: 13.5px;
      color: var(--text);
    }

    .msg-channel {
      font-size: 12px;
      font-weight: 500;
      padding: 1px 7px;
      border-radius: 4px;
      background: transparent;
      border-width: 1px;
      border-style: solid;
    }

    .msg-time {
      font-size: 11px;
      color: var(--text-dim);
      margin-left: auto;
    }

    .msg-mock {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      background: #1c1a0f;
      border: 1px solid #3d3210;
      color: var(--yellow);
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .msg-text {
      font-size: 13.5px;
      color: var(--text);
      word-break: break-word;
      line-height: 1.55;
    }

    /* ── Scrollbar ───────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      aside { width: 130px; }
      .msg-time { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Slack<span>er</span></div>
  <div class="status-pill disconnected" id="status-pill">
    <span class="status-dot"></span>
    <span id="status-text">Connecting…</span>
  </div>
  <div id="mock-badge" class="mock-badge" style="display:none">MOCK DATA</div>
  <div class="header-right">
    <span class="msg-count" id="msg-count">0 messages</span>
    <button class="btn-clear" id="btn-clear">Clear</button>
  </div>
</header>

<div class="layout">
  <aside id="sidebar">
    <div class="sidebar-label">Channels</div>
    <button class="channel-btn active" data-channel="all">
      <span class="channel-hash">#</span> all
      <span class="channel-count" id="count-all">0</span>
    </button>
  </aside>

  <main>
    <div id="feed">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">💬</div>
        <div class="empty-title">Waiting for messages</div>
        <div class="empty-sub">Activity from your connected Slack channels will appear here in real time.</div>
      </div>
    </div>
  </main>
</div>

<script>
(function () {
  'use strict';

  // ── State ──────────────────────────────────────────────────────────────────
  const messages = [];
  const channelCounts = {};
  let activeChannel = 'all';
  let autoScroll = true;
  let hasMock = false;

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const feed       = document.getElementById('feed');
  const sidebar    = document.getElementById('sidebar');
  const emptyState = document.getElementById('empty-state');
  const statusPill = document.getElementById('status-pill');
  const statusText = document.getElementById('status-text');
  const msgCount   = document.getElementById('msg-count');
  const mockBadge  = document.getElementById('mock-badge');
  const countAll   = document.getElementById('count-all');
  const btnClear   = document.getElementById('btn-clear');

  const CHANNEL_COLORS = ['#58a6ff','#3fb950','#d29922','#bc8cff','#ffa657','#ff7b72','#39d353','#56d364'];
  const USER_COLORS    = ['#58a6ff','#3fb950','#d29922','#bc8cff','#ffa657','#ff7b72','#39d353','#56d364','#e06c75','#61afef'];

  function hashIndex(str, len) {
    let h = 0;
    for (let i = 0; i < str.length; i++) h = (h * 31 + str.charCodeAt(i)) >>> 0;
    return h % len;
  }

  function channelColor(name) { return CHANNEL_COLORS[hashIndex(name, CHANNEL_COLORS.length)]; }
  function userColor(name)    { return USER_COLORS[hashIndex(name, USER_COLORS.length)]; }
  function userInitials(name) { return (name || '?').slice(0, 2).toUpperCase(); }

  function fmtTime(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diffMin = (now - d) / 60000;
    if (diffMin < 1)   return 'just now';
    if (diffMin < 60)  return `${Math.floor(diffMin)}m ago`;
    if (diffMin < 1440) {
      const h = d.getHours().toString().padStart(2, '0');
      const m = d.getMinutes().toString().padStart(2, '0');
      return `${h}:${m}`;
    }
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  // ── Render a single message card ───────────────────────────────────────────
  function renderMessage(msg, isNew) {
    const el = document.createElement('div');
    el.className = 'msg' + (isNew ? ' new' : '');
    el.dataset.id  = msg.id;
    el.dataset.channel = msg.channel;

    const uc = userColor(msg.user);
    const cc = channelColor(msg.channel);
    const hexAlpha = '20'; // ~12% opacity for bg

    el.innerHTML = `
      <div class="msg-avatar" style="background:${uc}22;color:${uc}">${userInitials(msg.user)}</div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-user">${escHtml(msg.user)}</span>
          <span class="msg-channel" style="color:${cc};background:${cc}18;border-color:${cc}30">#${escHtml(msg.channel)}</span>
          ${msg.mock ? '<span class="msg-mock">MOCK</span>' : ''}
          <span class="msg-time">${fmtTime(msg.ts)}</span>
        </div>
        <div class="msg-text">${escHtml(msg.text)}</div>
      </div>
    `;

    return el;
  }

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Channel sidebar ────────────────────────────────────────────────────────
  function upsertChannelBtn(channel) {
    if (document.querySelector(`[data-channel="${CSS.escape(channel)}"]`)) return;

    const cc = channelColor(channel);
    const btn = document.createElement('button');
    btn.className = 'channel-btn';
    btn.dataset.channel = channel;
    btn.innerHTML = `
      <span class="channel-hash" style="color:${cc}">#</span> ${escHtml(channel)}
      <span class="channel-count" id="count-${escHtml(channel)}">0</span>
    `;
    btn.addEventListener('click', () => setActiveChannel(channel));
    sidebar.appendChild(btn);
  }

  function updateCounts() {
    countAll.textContent = messages.length;
    for (const [ch, count] of Object.entries(channelCounts)) {
      const el = document.getElementById(`count-${ch}`);
      if (el) el.textContent = count;
    }
    const total = messages.length;
    msgCount.textContent = `${total} message${total !== 1 ? 's' : ''}`;
  }

  function setActiveChannel(ch) {
    activeChannel = ch;
    document.querySelectorAll('.channel-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.channel === ch);
    });
    document.querySelectorAll('.msg').forEach(el => {
      el.style.display = (ch === 'all' || el.dataset.channel === ch) ? '' : 'none';
    });
  }

  // ── Auto-scroll ────────────────────────────────────────────────────────────
  const mainEl = document.querySelector('main');
  mainEl.addEventListener('scroll', () => {
    const nearBottom = mainEl.scrollHeight - mainEl.scrollTop - mainEl.clientHeight < 80;
    autoScroll = nearBottom;
  });

  function scrollToBottom() {
    if (autoScroll) mainEl.scrollTop = mainEl.scrollHeight;
  }

  // ── Ingest message ─────────────────────────────────────────────────────────
  function ingestMessage(msg, isNew) {
    messages.push(msg);
    channelCounts[msg.channel] = (channelCounts[msg.channel] || 0) + 1;
    if (msg.mock) hasMock = true;

    upsertChannelBtn(msg.channel);

    // Remove empty state
    emptyState.remove();

    const el = renderMessage(msg, isNew);
    if (activeChannel !== 'all' && msg.channel !== activeChannel) {
      el.style.display = 'none';
    }
    feed.appendChild(el);

    // Remove 'new' highlight after 3s
    if (isNew) setTimeout(() => el.classList.remove('new'), 3000);

    updateCounts();
    if (hasMock) mockBadge.style.display = '';
    scrollToBottom();
  }

  // ── Clear button ───────────────────────────────────────────────────────────
  btnClear.addEventListener('click', () => {
    messages.length = 0;
    Object.keys(channelCounts).forEach(k => delete channelCounts[k]);
    feed.innerHTML = '';
    feed.appendChild(emptyState);
    // Reset channel counts in sidebar
    document.querySelectorAll('.channel-count').forEach(el => el.textContent = '0');
    updateCounts();
  });

  // ── Refresh timestamps every minute ───────────────────────────────────────
  setInterval(() => {
    document.querySelectorAll('.msg-time').forEach(el => {
      const msgEl = el.closest('.msg');
      const id = msgEl && msgEl.dataset.id;
      const msg = messages.find(m => m.id === id);
      if (msg) el.textContent = fmtTime(msg.ts);
    });
  }, 60_000);

  // ── SSE connection ─────────────────────────────────────────────────────────
  function setStatus(state, text) {
    statusPill.className = 'status-pill ' + state;
    statusText.textContent = text;
  }

  let reconnectDelay = 1000;

  function connect() {
    setStatus('', 'Connecting…');
    const es = new EventSource('/events');

    es.onopen = () => {
      setStatus('connected', 'Live');
      reconnectDelay = 1000;
    };

    es.onmessage = (e) => {
      let data;
      try { data = JSON.parse(e.data); } catch { return; }

      if (data.type === 'history') {
        data.messages.forEach(m => ingestMessage(m, false));
      } else if (data.type === 'message' || data.type === 'app_mention') {
        ingestMessage(data, true);
      }
    };

    es.onerror = () => {
      setStatus('disconnected', 'Reconnecting…');
      es.close();
      setTimeout(connect, reconnectDelay);
      reconnectDelay = Math.min(reconnectDelay * 1.5, 30_000);
    };
  }

  connect();
})();
</script>
</body>
</html>
